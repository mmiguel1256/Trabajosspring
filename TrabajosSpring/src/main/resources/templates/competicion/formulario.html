<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Competición</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap');

        :root {
            --verde:   #00c07f;
            --verde-d: #009e68;
            --oscuro:  #0d1117;
            --card-bg: #161b22;
            --borde:   #30363d;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--oscuro);
            color: #e6edf3;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--borde);
        }
        .navbar-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--verde) !important;
        }

        /* ── Back link ── */
        .back-link {
            color: #8b949e;
            text-decoration: none;
            font-size: .875rem;
            font-weight: 300;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color .2s;
            padding-top: 18px;
        }
        .back-link:hover { color: var(--verde); }

        /* ── Page header ── */
        .page-header {
            padding: 24px 0 24px;
            border-bottom: 1px solid var(--borde);
            margin-bottom: 36px;
        }
        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 3px;
            color: #fff;
            margin: 0;
        }
        .page-header h1 span { color: var(--verde); }
        .page-header p {
            color: #8b949e;
            font-size: .9rem;
            font-weight: 300;
            margin: 6px 0 0;
        }

        /* ── Form card ── */
        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--borde);
            border-radius: 14px;
            padding: 36px 40px;
            position: relative;
            overflow: hidden;
        }
        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--verde), transparent);
        }

        /* ── Section label ── */
        .section-label {
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #484f58;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--borde);
        }

        /* ── Labels ── */
        .form-label {
            font-size: .82rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 8px;
        }

        /* ── Inputs ── */
        .form-control {
            background: #0d1117;
            border: 1px solid var(--borde);
            border-radius: 8px;
            color: #e6edf3;
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            padding: 11px 16px;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control::placeholder { color: #484f58; }
        .form-control:focus {
            background: #0d1117;
            border-color: var(--verde);
            box-shadow: 0 0 0 3px rgba(0,192,127,.15);
            color: #e6edf3;
        }
        /* Fix date input calendar icon color */
        .form-control[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
            cursor: pointer;
        }
        .form-control[type="date"]::-webkit-calendar-picker-indicator:hover {
            filter: invert(0.8);
        }

        /* ── Input icon wrapper ── */
        .input-wrapper { position: relative; }
        .input-wrapper .bi {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #484f58;
            font-size: .95rem;
            pointer-events: none;
            transition: color .2s;
        }
        .input-wrapper .form-control { padding-left: 40px; }
        .input-wrapper:focus-within .bi { color: var(--verde); }

        /* ── Premio preview ── */
        .premio-preview {
            background: rgba(0,192,127,.08);
            border: 1px solid rgba(0,192,127,.2);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: .85rem;
            color: var(--verde);
            font-weight: 600;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        /* ── Fecha range indicator ── */
        .fecha-hint {
            font-size: .78rem;
            color: #484f58;
            font-weight: 300;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ── Divider ── */
        .form-divider {
            border-color: var(--borde);
            margin: 28px 0;
        }

        /* ── Buttons ── */
        .btn-guardar {
            background: var(--verde);
            border: none;
            border-radius: 8px;
            color: #0d1117;
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            padding: 12px 32px;
            transition: background .2s, transform .15s, box-shadow .2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-guardar:hover {
            background: var(--verde-d);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,192,127,.25);
            color: #0d1117;
        }
        .btn-guardar:active { transform: translateY(0); }

        .btn-cancelar {
            background: transparent;
            border: 1px solid var(--borde);
            border-radius: 8px;
            color: #8b949e;
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            padding: 12px 28px;
            transition: border-color .2s, color .2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-cancelar:hover {
            border-color: #8b949e;
            color: #e6edf3;
        }

        /* ── Required ── */
        .req { color: var(--verde); font-size: .75rem; margin-left: 4px; }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--borde);
            padding: 20px 0;
            color: #484f58;
            font-size: .82rem;
            margin-top: 60px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">
        <i class="bi bi-shield-fill me-2" style="color:var(--verde)"></i>
        TrabajosSpring
    </span>
    <span style="color:#484f58; font-size:.82rem; font-weight:300;">Puerto 8112</span>
</nav>

<div class="container" style="max-width: 700px;">

    <!-- Back -->
    <a th:href="@{/competiciones}" class="back-link">
        <i class="bi bi-arrow-left"></i> Volver a Competiciones
    </a>

    <!-- Page header -->
    <div class="page-header">
        <h1>
            <span th:text="${competicion.id == null ? 'Nueva' : 'Editar'}">Nueva</span>
            &nbsp;<span style="color:var(--verde)">Competición</span>
        </h1>
        <p th:text="${competicion.id == null
            ? 'Completa los campos para registrar una nueva competición.'
            : 'Modifica los campos que deseas actualizar.'}">
        </p>
    </div>

    <!-- Form card -->
    <div class="form-card">
        <form th:action="@{/competiciones/guardar}" method="post" th:object="${competicion}">
            <input type="hidden" th:field="*{id}" />

            <!-- Sección: Información general -->
            <div class="section-label">Información general</div>

            <!-- Nombre -->
            <div class="mb-4">
                <label class="form-label">Nombre <span class="req">*</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-trophy"></i>
                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           placeholder="Ej: Copa Libertadores"
                           required />
                </div>
            </div>

            <!-- Monto Premio -->
            <div class="mb-2">
                <label class="form-label">Monto Premio (USD)</label>
                <div class="input-wrapper">
                    <i class="bi bi-currency-dollar"></i>
                    <input type="number"
                           class="form-control"
                           th:field="*{montoPremio}"
                           placeholder="Ej: 1000000"
                           min="0"
                           id="montoInput"
                           oninput="mostrarPremio(this.value)" />
                </div>
                <!-- Preview formateado -->
                <div class="premio-preview" id="premioPreview">
                    <i class="bi bi-stars"></i>
                    <span id="premioFormateado"></span>
                </div>
            </div>

            <hr class="form-divider">

            <!-- Sección: Fechas -->
            <div class="section-label">Duración del torneo</div>

            <div class="row g-3 mb-4">
                <!-- Fecha inicio -->
                <div class="col-12 col-sm-6">
                    <label class="form-label">Fecha de Inicio</label>
                    <div class="input-wrapper">
                        <i class="bi bi-calendar-event"></i>
                        <input type="date"
                               class="form-control"
                               th:field="*{fechaInicio}"
                               id="fechaInicio"
                               onchange="calcularDuracion()" />
                    </div>
                </div>
                <!-- Fecha fin -->
                <div class="col-12 col-sm-6">
                    <label class="form-label">Fecha de Fin</label>
                    <div class="input-wrapper">
                        <i class="bi bi-calendar-check"></i>
                        <input type="date"
                               class="form-control"
                               th:field="*{fechaFin}"
                               id="fechaFin"
                               onchange="calcularDuracion()" />
                    </div>
                </div>
            </div>

            <!-- Duración calculada -->
            <div class="fecha-hint" id="duracionHint" style="display:none; margin-top:-8px; margin-bottom:16px;">
                <i class="bi bi-clock" style="color:var(--verde)"></i>
                <span id="duracionTexto" style="color:#8b949e;"></span>
            </div>

            <hr class="form-divider">

            <!-- Actions -->
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <button type="submit" class="btn-guardar">
                    <i class="bi bi-check-lg"></i>
                    Guardar competición
                </button>
                <a th:href="@{/competiciones}" class="btn-cancelar">
                    <i class="bi bi-x"></i>
                    Cancelar
                </a>
                <span class="ms-auto" style="color:#484f58; font-size:.8rem;">
                    <span class="req">*</span> Campo obligatorio
                </span>
            </div>

        </form>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container d-flex justify-content-between flex-wrap gap-2" style="max-width:700px;">
        <span>TrabajosSpring &mdash; Spring Boot 3 · Thymeleaf · MySQL</span>
        <span>localhost:8112</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Preview del monto formateado
    function mostrarPremio(valor) {
        const preview = document.getElementById('premioPreview');
        const texto   = document.getElementById('premioFormateado');
        if (valor && parseInt(valor) > 0) {
            const formateado = new Intl.NumberFormat('es-CO', {
                style: 'currency', currency: 'USD', maximumFractionDigits: 0
            }).format(valor);
            texto.textContent = 'Premio: ' + formateado + ' USD';
            preview.style.display = 'flex';
        } else {
            preview.style.display = 'none';
        }
    }

    // Calcular duración entre fechas
    function calcularDuracion() {
        const inicio = document.getElementById('fechaInicio').value;
        const fin    = document.getElementById('fechaFin').value;
        const hint   = document.getElementById('duracionHint');
        const texto  = document.getElementById('duracionTexto');

        if (inicio && fin) {
            const d1   = new Date(inicio);
            const d2   = new Date(fin);
            const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            if (diff > 0) {
                const meses = Math.floor(diff / 30);
                const dias  = diff % 30;
                let msg = 'Duración: ' + diff + ' días';
                if (meses > 0) msg += ' (' + meses + ' mes' + (meses > 1 ? 'es' : '') +
                                      (dias > 0 ? ' y ' + dias + ' día' + (dias > 1 ? 's' : '') : '') + ')';
                texto.textContent = msg;
                hint.style.display = 'flex';
            } else if (diff < 0) {
                texto.textContent = '⚠ La fecha de fin debe ser posterior a la de inicio.';
                hint.style.display = 'flex';
            } else {
                hint.style.display = 'none';
            }
        } else {
            hint.style.display = 'none';
        }
    }

    // Inicializar si ya hay valores (modo editar)
    window.addEventListener('DOMContentLoaded', () => {
        const monto = document.getElementById('montoInput').value;
        if (monto) mostrarPremio(monto);
        calcularDuracion();
    });
</script>
</body>
</html>
